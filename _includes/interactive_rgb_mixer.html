<link rel="stylesheet" href="/css/interactive.css">
<script src="/js/interactive_rgb_mixer.js"></script>
<div id="rgb-mixer" class="dt-widget">
  <div class="dt-widget-header">
    <h3 class="dt-widget-title" id="widget-rgb-mixer">Interactive: RGB Color Mixer</h3>
  </div>
  <div class="dt-widget-body">
    <div class="rgb-layout">
      <div class="rgb-controls">
        <div class="dt-control-group">
          <span class="dt-label-text">Red</span>
          <input type="range" class="dt-slider rgb-slider" data-channel="r" min="0" max="255" value="128">
          <span class="dt-label-value rgb-r-val">255</span>
        </div>
        <div class="dt-control-group">
          <span class="dt-label-text">Green</span>
          <input type="range" class="dt-slider rgb-slider" data-channel="g" min="0" max="255" value="64">
          <span class="dt-label-value rgb-g-val">128</span>
        </div>
        <div class="dt-control-group">
          <span class="dt-label-text">Blue</span>
          <input type="range" class="dt-slider rgb-slider" data-channel="b" min="0" max="255" value="128">
          <span class="dt-label-value rgb-b-val">64</span>
        </div>
      </div>
      <div class="rgb-swatch-area">
        <div class="rgb-swatch" style="background: rgb(128,64,128);"></div>
      </div>
    </div>
    <div class="rgb-values">
      <div class="rgb-value-item"><span class="rgb-value-label">HEX</span><span class="rgb-value-val rgb-hex-val">#804080</span></div>
      <div class="rgb-value-item"><span class="rgb-value-label">RGB</span><span class="rgb-value-val rgb-rgb-val">128, 64, 128</span></div>
      <div class="rgb-value-item"><span class="rgb-value-label">HSV</span><span class="rgb-value-val rgb-hsv-val">300&deg;, 50%, 50%</span></div>
      <div class="rgb-value-item"><span class="rgb-value-label">CMYK</span><span class="rgb-value-val rgb-cmyk-val">0%, 50%, 0%, 50%</span></div>
    </div>
    <div class="rgb-presets">
      <span class="rgb-preset-label">Quick presets:</span>
      <button class="rgb-preset-btn" data-r="255" data-g="0" data-b="0" style="background:#f00"></button>
      <button class="rgb-preset-btn" data-r="0" data-g="255" data-b="0" style="background:#0f0"></button>
      <button class="rgb-preset-btn" data-r="0" data-g="0" data-b="255" style="background:#00f"></button>
      <button class="rgb-preset-btn" data-r="255" data-g="255" data-b="0" style="background:#ff0"></button>
      <button class="rgb-preset-btn" data-r="0" data-g="255" data-b="255" style="background:#0ff"></button>
      <button class="rgb-preset-btn" data-r="255" data-g="0" data-b="255" style="background:#f0f"></button>
      <button class="rgb-preset-btn" data-r="255" data-g="255" data-b="255" style="background:#fff"></button>
      <button class="rgb-preset-btn" data-r="0" data-g="0" data-b="0" style="background:#000"></button>
      <button class="rgb-preset-btn" data-r="128" data-g="128" data-b="128" style="background:#888"></button>
    </div>
  </div>
  <div class="dt-widget-footer">
    Drag the R, G, B sliders to mix any color. RGB is additive: all primaries at full intensity gives white, zero intensity gives black.
  </div>
</div>
