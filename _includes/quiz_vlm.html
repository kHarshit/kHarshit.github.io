<link rel="stylesheet" href="/css/quiz.css">
<div id="quiz">
  <div class="quiz-header">
    <h2 class="quiz-title" id="test-your-knowledge">QUIZ: Test Your Knowledge</h2>
    <div class="quiz-progress">
      <span class="quiz-progress-text"></span>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill"></div></div>
    </div>
  </div>

  <div class="quiz-question-area">
    <p class="quiz-question-text"></p>
    <div class="quiz-options"></div>
  </div>

  <div class="quiz-footer">
    <button class="quiz-btn quiz-btn-secondary" id="prev-btn">&#8592; Prev</button>
    <div class="quiz-footer-right">
      <button class="quiz-btn quiz-btn-primary" id="next-btn">Next &#8594;</button>
      <button class="quiz-btn quiz-btn-primary" id="submit-btn" style="display:none">Submit</button>
    </div>
  </div>

  <div class="quiz-results" style="display:none">
    <div class="quiz-results-emoji"></div>
    <p class="quiz-results-message"></p>
    <p class="quiz-results-score"></p>
    <button class="quiz-btn quiz-btn-secondary" id="retake-btn">&#8635; Retake Quiz</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script>
    var all_questions = [{
      question_string: "What is the core training objective of CLIP?",
      choices: {
        correct: "Predict correct image-text pairings using a symmetric contrastive loss",
        wrong: ["Generate captions for images using autoregressive decoding", "Classify images into predefined categories", "Reconstruct masked image patches"]
      }
    }, {
      question_string: "How does FLAVA differ from CLIP in its approach to VLM training?",
      choices: {
        correct: "FLAVA uses masking for both image and text, plus a multimodal encoder with MIM, MLM, and contrastive losses",
        wrong: ["FLAVA only trains on text data", "FLAVA uses only generative loss for image synthesis", "FLAVA does not use any vision encoder"]
      }
    }, {
      question_string: "What sets generative VLMs like CoCa apart from contrastive approaches?",
      choices: {
        correct: "They combine contrastive and generative losses to both align modalities and generate text or images",
        wrong: ["They only generate images without any text understanding", "They do not use any pretraining", "They rely solely on masked language modeling"]
      }
    }, {
      question_string: "In the Frozen model, how is catastrophic forgetting addressed?",
      choices: {
        correct: "The language model is kept frozen while only the vision encoder and mapping layers are trained",
        wrong: ["The vision encoder is kept frozen while the language model is fine-tuned", "Both models are trained from scratch", "Only the output layer is trained"]
      }
    }, {
      question_string: "What is the role of the linear projection layer in LLaVA?",
      choices: {
        correct: "To project visual features from the CLIP vision encoder into the language model's embedding space",
        wrong: ["To convert text into image features", "To classify images into categories", "To generate image tokens from text"]
      }
    }, {
      question_string: "How is masking applied in transformer-based VLMs like FLAVA?",
      choices: {
        correct: "Image patches are masked for MIM, text tokens are masked for MLM, and both can be masked jointly for multimodal masking",
        wrong: ["Only text tokens are masked; images are never masked", "Only image patches are masked; text is always unmasked", "Masking is not used in transformer-based VLMs"]
      }
    }];
  </script>
  <script src="/js/quiz.js"></script>
</div>
