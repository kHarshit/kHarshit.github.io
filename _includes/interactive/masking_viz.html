<link rel="stylesheet" href="/css/interactive.css">
<script src="/js/interactive/masking_viz.js"></script>
<div id="masking-viz" class="dt-widget">
  <div class="dt-widget-header">
    <h3 class="dt-widget-title" id="widget-masking-viz">Interactive: Masking Strategy Visualizer</h3>
  </div>
  <div class="dt-widget-body">
    <div style="display:flex;gap:4px;margin-bottom:16px;background:#f1f5f9;border-radius:8px;padding:3px;">
      <button class="masking-tab" data-mode="mlm" style="flex:1;padding:8px 12px;border:none;border-radius:6px;font-size:0.85rem;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;">MLM (Text Only)</button>
      <button class="masking-tab" data-mode="mim" style="flex:1;padding:8px 12px;border:none;border-radius:6px;font-size:0.85rem;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;">MIM (Image Only)</button>
      <button class="masking-tab" data-mode="mmm" style="flex:1;padding:8px 12px;border:none;border-radius:6px;font-size:0.85rem;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;">MMM (Both)</button>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <div style="flex:1;min-width:200px;">
        <div style="font-size:0.78rem;font-weight:600;color:var(--font-color,#555);margin-bottom:6px;text-align:center;">Image Patches</div>
        <div class="masking-image-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-width:280px;margin:0 auto;"></div>
      </div>
      <div style="flex:1;min-width:200px;">
        <div style="font-size:0.78rem;font-weight:600;color:var(--font-color,#555);margin-bottom:6px;text-align:center;">Text Tokens</div>
        <div class="masking-text-tokens" style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:10px;background:var(--bg-color,#f8fafc);border:1px solid #e2e8f0;border-radius:8px;"></div>
      </div>
    </div>
    <div class="masking-description" style="margin-top:14px;padding:10px 14px;background:var(--bg-color,#f8fafc);border:1px solid #e2e8f0;border-radius:8px;font-size:0.85rem;color:var(--font-color,#555);text-align:center;"></div>
  </div>
  <div class="dt-widget-footer">
    Masking trains the model to predict missing content.
  </div>
</div>
