<link rel="stylesheet" href="/css/interactive.css">
<style>
#mcp3d-container {
  width: 100%;
  height: 440px;
  position: relative;
  background: var(--bg-color, #fff);
  border-radius: 8px;
  overflow: hidden;
  cursor: grab;
}
#mcp3d-container:active { cursor: grabbing; }
#mcp3d-container canvas { display: block; }
.mcp3d-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 12px 12px 2px;
  flex-wrap: wrap;
}
.mcp3d-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--font-color, #333);
}
.mcp3d-legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.mcp3d-info {
  text-align: center;
  color: #888;
  font-size: 12px;
  padding: 4px 12px 10px;
}
.mcp3d-detail {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  display: none;
  z-index: 10;
  max-width: 320px;
  width: 90%;
  text-align: center;
  pointer-events: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  backdrop-filter: blur(8px);
}
.mcp3d-detail .mcp3d-dd-name { font-weight: 600; font-size: 15px; }
.mcp3d-detail .mcp3d-dd-role { opacity: 0.7; font-size: 12px; }
.mcp3d-detail .mcp3d-dd-desc { opacity: 0.85; font-size: 12px; margin-top: 4px; }
</style>
<script>
(function() {
  if (document.querySelector('script[type="importmap"]')) return;
  var im = document.createElement('script');
  im.type = 'importmap';
  im.textContent = JSON.stringify({
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  });
  document.head.appendChild(im);
})();
</script>
<script type="module" src="/js/interactive/3d_mcp_arch.js"></script>
<div id="mcp3d-viz" class="dt-widget">
  <div class="dt-widget-header">
    <h3 class="dt-widget-title" id="widget-3d-mcp-arch">Interactive: 3D MCP Architecture</h3>
  </div>
  <div class="dt-widget-body" style="position:relative">
    <div id="mcp3d-container">
      <div class="mcp3d-detail" id="mcp3d-detail">
        <div class="mcp3d-dd-name" id="mcp3d-dd-name"></div>
        <div class="mcp3d-dd-role" id="mcp3d-dd-role"></div>
        <div class="mcp3d-dd-desc" id="mcp3d-dd-desc"></div>
      </div>
    </div>
    <div class="mcp3d-legend">
      <span class="mcp3d-legend-item"><span class="mcp3d-legend-dot" style="background:#6366f1"></span>MCP Host</span>
      <span class="mcp3d-legend-item"><span class="mcp3d-legend-dot" style="background:#20B2AA"></span>MCP Clients</span>
      <span class="mcp3d-legend-item"><span class="mcp3d-legend-dot" style="background:#10b981"></span>MCP Servers</span>
    </div>
    <div class="mcp3d-info">Drag to orbit &bull; Hover a node for details &bull; Host creates a Client per Server</div>
  </div>
</div>
