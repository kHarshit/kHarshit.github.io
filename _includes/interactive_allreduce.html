<link rel="stylesheet" href="/css/interactive.css">
<script src="/js/interactive_allreduce.js"></script>
<div id="ar-viz" class="dt-widget">
  <div class="dt-widget-header">
    <p class="dt-widget-title">Interactive: Ring AllReduce</p>
  </div>
  <div class="dt-widget-body">
    <div class="ar-container">
      <div class="ar-card" data-gpu="0">
        <div class="ar-card-title">GPU 0</div>
        <div class="ar-slots"></div>
      </div>
      <div class="ar-card" data-gpu="1">
        <div class="ar-card-title">GPU 1</div>
        <div class="ar-slots"></div>
      </div>
      <div class="ar-card" data-gpu="3">
        <div class="ar-card-title">GPU 3</div>
        <div class="ar-slots"></div>
      </div>
      <div class="ar-card" data-gpu="2">
        <div class="ar-card-title">GPU 2</div>
        <div class="ar-slots"></div>
      </div>
    </div>
    <div class="ar-step-label">Initial vectors on each GPU</div>
    <div class="ar-step-bar"></div>
    <div class="ar-controls">
      <button class="ar-btn ar-btn-secondary ar-back-btn">Back</button>
      <button class="ar-btn ar-btn-primary ar-next-btn">Next</button>
      <button class="ar-btn ar-btn-secondary ar-reset-btn">Reset</button>
    </div>
  </div>
  <div class="dt-widget-footer">
   Total 4 GPUs, (N-1=3 scatter-reduce steps) + (N-1=3 all-gather steps). Each GPU sends one chunk per step.
  </div>
</div>
