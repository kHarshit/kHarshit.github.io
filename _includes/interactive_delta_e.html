<link rel="stylesheet" href="/css/interactive.css">
<script src="/js/interactive_delta_e.js"></script>
<div id="de-compare" class="dt-widget">
  <div class="dt-widget-header">
    <h3 class="dt-widget-title" id="widget-delta-e">Interactive: Delta E Color Comparator</h3>
  </div>
  <div class="dt-widget-body">
    <div class="de-layout">
      <div class="de-color-a">
        <div class="de-side-header">Color A</div>
        <div class="de-swatch de-swatch-a" style="background: rgb(255,0,0);"></div>
        <div class="de-side-controls">
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Red</span>
            <input type="range" class="dt-slider de-slider" data-side="a" data-channel="r" min="0" max="255" value="255">
            <span class="dt-label-value de-ar-val">255</span>
          </div>
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Green</span>
            <input type="range" class="dt-slider de-slider" data-side="a" data-channel="g" min="0" max="255" value="0">
            <span class="dt-label-value de-ag-val">0</span>
          </div>
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Blue</span>
            <input type="range" class="dt-slider de-slider" data-side="a" data-channel="b" min="0" max="255" value="0">
            <span class="dt-label-value de-ab-val">0</span>
          </div>
          <div class="de-hex-label"><span class="de-ahex-val">#ff0000</span></div>
        </div>
      </div>
      <div class="de-vs">
        <div class="de-vs-text">vs</div>
      </div>
      <div class="de-color-b">
        <div class="de-side-header">Color B</div>
        <div class="de-swatch de-swatch-b" style="background: rgb(0,0,255);"></div>
        <div class="de-side-controls">
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Red</span>
            <input type="range" class="dt-slider de-slider" data-side="b" data-channel="r" min="0" max="255" value="0">
            <span class="dt-label-value de-br-val">0</span>
          </div>
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Green</span>
            <input type="range" class="dt-slider de-slider" data-side="b" data-channel="g" min="0" max="255" value="0">
            <span class="dt-label-value de-bg-val">0</span>
          </div>
          <div class="dt-control-group de-side-group">
            <span class="dt-label-text">Blue</span>
            <input type="range" class="dt-slider de-slider" data-side="b" data-channel="b" min="0" max="255" value="255">
            <span class="dt-label-value de-bb-val">255</span>
          </div>
          <div class="de-hex-label"><span class="de-bhex-val">#0000ff</span></div>
        </div>
      </div>
    </div>
    <div class="de-results">
      <div class="de-result-card">
        <div class="de-result-label">CIE76 (&Delta;E*ab)</div>
        <div class="de-result-value de-cie76-val">---</div>
      </div>
      <div class="de-result-card">
        <div class="de-result-label">CIE94 (&Delta;E*94)</div>
        <div class="de-result-value de-cie94-val">---</div>
      </div>
      <div class="de-result-card">
        <div class="de-result-label">CIE00 (&Delta;E00)</div>
        <div class="de-result-value de-cie00-val">---</div>
      </div>
      <div class="de-result-card de-result-perception">
        <div class="de-result-label">Perception</div>
        <div class="de-result-value de-perception-val">---</div>
      </div>
    </div>
    <div class="de-presets">
      <span class="de-preset-label">Preset pairs:</span>
      <button class="de-preset-btn" data-a="255,0,0" data-b="0,0,255">Red vs Blue</button>
      <button class="de-preset-btn" data-a="255,255,255" data-b="0,0,0">White vs Black</button>
      <button class="de-preset-btn" data-a="255,0,0" data-b="255,100,100">Red vs Pink</button>
      <button class="de-preset-btn" data-a="0,128,0" data-b="0,255,0">Dark vs Light Green</button>
      <button class="de-preset-btn" data-a="0,0,200" data-b="0,0,210">Blue neighbors</button>
      <button class="de-preset-btn" data-a="200,0,0" data-b="210,0,0">Red neighbors</button>
    </div>
  </div>
  <div class="dt-widget-footer">
    Delta E quantifies perceptual difference between colors.
  </div>
</div>
