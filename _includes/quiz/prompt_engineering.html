<link rel="stylesheet" href="/css/quiz.css">
<div id="quiz">
  <div class="quiz-header">
    <h2 class="quiz-title" id="test-your-knowledge">QUIZ: Test Your Knowledge</h2>
    <div class="quiz-progress">
      <span class="quiz-progress-text"></span>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill"></div></div>
    </div>
  </div>

  <div class="quiz-question-area">
    <p class="quiz-question-text"></p>
    <div class="quiz-options"></div>
  </div>

  <div class="quiz-footer">
    <button class="quiz-btn quiz-btn-secondary" id="prev-btn">&#8592; Prev</button>
    <div class="quiz-footer-right">
      <button class="quiz-btn quiz-btn-primary" id="next-btn">Next &#8594;</button>
      <button class="quiz-btn quiz-btn-primary" id="submit-btn" style="display:none">Submit</button>
    </div>
  </div>

  <div class="quiz-results" style="display:none">
    <div class="quiz-results-emoji"></div>
    <p class="quiz-results-message"></p>
    <p class="quiz-results-score"></p>
    <button class="quiz-btn quiz-btn-secondary" id="retake-btn">&#8635; Retake Quiz</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script>
    var all_questions = [{
      question_string: "What are the four components of a well-structured prompt?",
      choices: {
        correct: "Role / Persona, Task / Instruction, Context / Input Data, Output Format",
        wrong: ["Temperature, Top-P, Frequency Penalty, Presence Penalty", "Title, Body, Conclusion, References", "System prompt, User prompt, Assistant response, Feedback loop"]
      }
    }, {
      question_string: "How does chain-of-thought (CoT) prompting improve model reasoning?",
      choices: {
        correct: "It encourages the model to produce intermediate reasoning steps before arriving at the final answer",
        wrong: ["It fine-tunes the model on additional training data", "It increases the temperature parameter for more creative outputs", "It replaces the model's weights with a larger variant"]
      }
    }, {
      question_string: "What is the key idea behind zero-shot chain-of-thought prompting?",
      choices: {
        correct: "Simply appending 'Think step by step' to a prompt to elicit reasoning without any examples",
        wrong: ["Providing 100+ examples in the prompt with detailed reasoning chains", "Using a separate model to generate reasoning traces", "Fine-tuning on a large dataset of step-by-step solutions"]
      }
    }, {
      question_string: "In the ReAct pattern, what follows a Thought step?",
      choices: {
        correct: "An Action (e.g., calling a tool or API) followed by an Observation",
        wrong: ["Immediate final answer without any intermediate steps", "Another Thought step with more reasoning", "A request to the user for clarification"]
      }
    }, {
      question_string: "How does PAL (Program-aided Language Models) differ from standard chain-of-thought?",
      choices: {
        correct: "PAL generates code interleaved with natural language and uses an external interpreter for computation",
        wrong: ["PAL uses images instead of text for reasoning", "PAL requires twice as many examples as CoT", "PAL can only solve visual reasoning tasks"]
      }
    }, {
      question_string: "When using few-shot prompting, what is a critical best practice?",
      choices: {
        correct: "Ensure the examples cover the expected input-output format and distribution to avoid biasing the model",
        wrong: ["Always use exactly 50 examples for the best results", "Place the examples after the test input", "Shuffle the examples randomly on every inference call"]
      }
    }];
  </script>
  <script src="/js/quiz/quiz.js"></script>
</div>
