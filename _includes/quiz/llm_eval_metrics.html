<link rel="stylesheet" href="/css/quiz.css">
<div id="quiz">
  <div class="quiz-header">
    <h2 class="quiz-title" id="test-your-knowledge">QUIZ: Test Your Knowledge</h2>
    <div class="quiz-progress">
      <span class="quiz-progress-text"></span>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill"></div></div>
    </div>
  </div>

  <div class="quiz-question-area">
    <p class="quiz-question-text"></p>
    <div class="quiz-options"></div>
  </div>

  <div class="quiz-footer">
    <button class="quiz-btn quiz-btn-secondary" id="prev-btn">&#8592; Prev</button>
    <div class="quiz-footer-right">
      <button class="quiz-btn quiz-btn-primary" id="next-btn">Next &#8594;</button>
      <button class="quiz-btn quiz-btn-primary" id="submit-btn" style="display:none">Submit</button>
    </div>
  </div>

  <div class="quiz-results" style="display:none">
    <div class="quiz-results-emoji"></div>
    <p class="quiz-results-message"></p>
    <p class="quiz-results-score"></p>
    <button class="quiz-btn quiz-btn-secondary" id="retake-btn">&#8635; Retake Quiz</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script>
    var all_questions = [{
      question_string: "What does perplexity measure in a language model?",
      choices: {
        correct: "How 'confused' the model is (average number of equally likely tokens it chooses from at each step)",
        wrong: ["How many parameters the model has", "The total vocabulary size of the model", "How fast the model can generate text"]
      }
    }, {
      question_string: "What problem does the clipped precision in BLEU solve?",
      choices: {
        correct: "It prevents gaming the score by repeating a single word that appears in the reference",
        wrong: ["It penalizes long generated sentences", "It adds synonym matching using WordNet", "It measures recall instead of precision"]
      }
    }, {
      question_string: "How does ROUGE differ from BLEU?",
      choices: {
        correct: "ROUGE is recall-based, while BLEU is precision-based",
        wrong: ["ROUGE is precision-based, while BLEU is recall-based", "ROUGE only works for translation, BLEU only for summarization", "ROUGE uses BERT embeddings while BLEU uses n-grams"]
      }
    }, {
      question_string: "What advantage does BERTScore have over n-gram metrics like BLEU and ROUGE?",
      choices: {
        correct: "It captures semantic similarity using contextual embeddings, so synonyms and paraphrases can still match",
        wrong: ["It is much faster to compute", "It does not require any reference text", "It only works for single-word outputs"]
      }
    }, {
      question_string: "In a RAG pipeline, what does faithfulness measure?",
      choices: {
        correct: "Whether the generated answer is supported by the provided context",
        wrong: ["Whether the retrieved chunks are relevant to the question", "How fast the retrieval system returns results", "Whether the answer uses grammatically correct language"]
      }
    }, {
      question_string: "What is the relationship between cross-entropy and perplexity?",
      choices: {
        correct: "Perplexity equals 2 raised to the power of cross-entropy (PP = 2^H)",
        wrong: ["They are unrelated metrics", "Perplexity is the negative of cross-entropy", "Cross-entropy equals 2 raised to the power of perplexity"]
      }
    }];
  </script>
  <script src="/js/quiz/quiz.js"></script>
</div>
