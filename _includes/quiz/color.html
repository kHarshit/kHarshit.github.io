<link rel="stylesheet" href="/css/quiz.css">
<div id="quiz">
  <div class="quiz-header">
    <h2 class="quiz-title" id="test-your-knowledge">QUIZ: Test Your Knowledge</h2>
    <div class="quiz-progress">
      <span class="quiz-progress-text"></span>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill"></div></div>
    </div>
  </div>

  <div class="quiz-question-area">
    <p class="quiz-question-text"></p>
    <div class="quiz-options"></div>
  </div>

  <div class="quiz-footer">
    <button class="quiz-btn quiz-btn-secondary" id="prev-btn">&#8592; Prev</button>
    <div class="quiz-footer-right">
      <button class="quiz-btn quiz-btn-primary" id="next-btn">Next &#8594;</button>
      <button class="quiz-btn quiz-btn-primary" id="submit-btn" style="display:none">Submit</button>
    </div>
  </div>

  <div class="quiz-results" style="display:none">
    <div class="quiz-results-emoji"></div>
    <p class="quiz-results-message"></p>
    <p class="quiz-results-score"></p>
    <button class="quiz-btn quiz-btn-secondary" id="retake-btn">&#8635; Retake Quiz</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
  <script>
    var all_questions = [{
      question_string: "What measures the purity or intensity of the color?",
      choices: {
        correct: "Saturation",
        wrong: ["Hue", "Brightness", "None of these"]
      }
    }, {
      question_string: "Which characteristic corresponds to the difference between black and white color?",
      choices: {
        correct: "Value",
        wrong: ["Hue", "Saturation", "All of these"]
      }
    }, {
      question_string: "Which of the following are additive models of color?",
      choices: {
        correct: "RGB",
        wrong: ["CYMK", "Both of these", "None of these"]
      }
    }, {
      question_string: "Which color model is closer to how human eye perceives color?",
      choices: {
        correct: "Delta E",
        wrong: ["RGB", "CYMK", "HSV"]
      }
    }, {
      question_string: "A Delta E (ΔE) value of less than 1 between two colors means:",
      choices: {
        correct: "The difference is not perceptible to the human eye",
        wrong: ["The colors are identical in RGB space", "The colors are exact opposites", "The difference is clearly visible at a glance"]
      }
    }];
  </script>
  <script src="/js/quiz/quiz.js"></script>
</div>
