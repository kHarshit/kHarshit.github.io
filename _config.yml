twitter_username: harshit_kumar1
kaggle_username: k2harshit
linkedin_username: kHarshit
stackoverflow_username: 6210807/kHarshit

# use master  branch for jekyll-github-metadata
github:
  source:
    branch: master


# Build settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title


# Google services
google_analytics: UA-103268503-1

# Pagination
paginate: 10
paginate_path: "/blog/page:num/"


collections:
  poetry:
    output: true
    permalink: /poems/:title/

# Giscus comments (populate repo_id and category_id from https://giscus.app)
giscus:
  repo: "kHarshit/kHarshit.github.io"
  repo_id: "MDEwOlJlcG9zaXRvcnk5NDgwMTQ2Mg=="           # TODO: fill from giscus.app
  category: "General"
  category_id: "DIC_kwDOBaaONs4C_oJT"       # TODO: fill from giscus.app
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "1"
  input_position: "top"
  theme: "preferred_color_scheme"
  lang: "en"

plugins:
  - jekyll-feed
  - jekyll-sitemap  # sitemap at /sitemap.xml
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata
