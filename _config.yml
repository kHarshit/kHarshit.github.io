name: Harshit Kumar
title: Harshit Kumar
email: kumar_harshit@outlook.com
description: "Machine Learning Engineer specializing in deep learning, computer vision, and NLP. Technical blog and portfolio by Harshit Kumar."
url: https://kHarshit.github.io
