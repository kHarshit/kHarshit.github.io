name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Inject GitHub token
        run: sed -i 's|github_contact_token: \"\"|github_contact_token: "${{ secrets.PRIVATE_REPO_CHATBOT_TOKEN }}"|' _config.yml

      - name: Build site
        run: bundle exec jekyll build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
