<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ======== LAYER 1: AI APPLICATIONS ======== -->
  <text x="60" y="48" font-size="16" font-weight="700" fill="#20B2AA">AI APPLICATIONS</text>

  <rect x="80" y="64" width="220" height="64" rx="10" fill="#eef2ff" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="190" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Claude Desktop</text>
  <text x="190" y="114" text-anchor="middle" font-size="13" fill="#64748b">AI Chat Interface</text>

  <rect x="340" y="64" width="220" height="64" rx="10" fill="#eef2ff" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="450" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">VS Code / IDE</text>
  <text x="450" y="114" text-anchor="middle" font-size="13" fill="#64748b">AI-Powered Editor</text>

  <rect x="600" y="64" width="220" height="64" rx="10" fill="#eef2ff" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="710" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Custom AI Apps</text>
  <text x="710" y="114" text-anchor="middle" font-size="13" fill="#64748b">Your Application</text>

  <!-- Lines from AI to MCP layer -->
  <line x1="190" y1="128" x2="190" y2="180" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="450" y1="128" x2="450" y2="180" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="710" y1="128" x2="710" y2="180" stroke="#20B2AA" stroke-width="2.5"/>

  <!-- ======== LAYER 2: MCP INTEGRATION LAYER ======== -->
  <rect x="60" y="180" width="780" height="170" rx="14" fill="#ecfeff" stroke="#20B2AA" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- MCP label -->
  <rect x="340" y="192" width="220" height="40" rx="20" fill="url(#mcpGrad)"/>
  <text x="450" y="218" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">MCP Protocol Layer</text>

  <text x="450" y="250" text-anchor="middle" font-size="14" fill="#0d9488" font-weight="600">Standardized JSON-RPC 2.0 Communication</text>

  <!-- Protocol features -->
  <rect x="90" y="268" width="160" height="36" rx="8" fill="#fff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="170" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#0d9488">Tool Discovery</text>

  <rect x="270" y="268" width="160" height="36" rx="8" fill="#fff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="350" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#0d9488">Tool Execution</text>

  <rect x="450" y="268" width="160" height="36" rx="8" fill="#fff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="530" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#0d9488">Resource Access</text>

  <rect x="630" y="268" width="180" height="36" rx="8" fill="#fff" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="720" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#0d9488">Lifecycle Mgmt</text>

  <!-- Capability badges -->
  <rect x="180" y="312" width="110" height="26" rx="13" fill="#ccfbf1" stroke="none"/>
  <text x="235" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Capabilities</text>
  <rect x="310" y="312" width="110" height="26" rx="13" fill="#ccfbf1" stroke="none"/>
  <text x="365" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Security</text>
  <rect x="440" y="312" width="110" height="26" rx="13" fill="#ccfbf1" stroke="none"/>
  <text x="495" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Negotiation</text>
  <rect x="570" y="312" width="110" height="26" rx="13" fill="#ccfbf1" stroke="none"/>
  <text x="625" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Notifications</text>

  <!-- Lines from MCP to Data layer -->
  <line x1="180" y1="350" x2="180" y2="436" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="400" y1="350" x2="400" y2="436" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="620" y1="350" x2="620" y2="436" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="300" y1="350" x2="300" y2="514" stroke="#20B2AA" stroke-width="2.5"/>
  <line x1="540" y1="350" x2="540" y2="514" stroke="#20B2AA" stroke-width="2.5"/>

  <!-- ======== LAYER 3: DATA SOURCES & TOOLS ======== -->
  <text x="60" y="420" font-size="16" font-weight="700" fill="#20B2AA">DATA SOURCES &amp; TOOLS</text>

  <rect x="80" y="436" width="200" height="62" rx="10" fill="#fffbeb" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="180" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Databases</text>
  <text x="180" y="482" text-anchor="middle" font-size="12" fill="#64748b">PostgreSQL, MySQL, SQLite</text>

  <rect x="300" y="436" width="200" height="62" rx="10" fill="#fffbeb" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="400" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">SaaS Tools</text>
  <text x="400" y="482" text-anchor="middle" font-size="12" fill="#64748b">Slack, Notion, Jira, GitHub</text>

  <rect x="520" y="436" width="200" height="62" rx="10" fill="#fffbeb" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="620" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">File Systems</text>
  <text x="620" y="482" text-anchor="middle" font-size="12" fill="#64748b">Local &amp; Cloud Storage</text>

  <rect x="200" y="514" width="200" height="62" rx="10" fill="#fffbeb" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="300" y="538" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Internal APIs</text>
  <text x="300" y="560" text-anchor="middle" font-size="12" fill="#64748b">REST, GraphQL, gRPC</text>

  <rect x="440" y="514" width="200" height="62" rx="10" fill="#fffbeb" stroke="#20B2AA" stroke-width="2" filter="url(#shadowLight)"/>
  <text x="540" y="538" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Custom Tools</text>
  <text x="540" y="560" text-anchor="middle" font-size="12" fill="#64748b">Python, Shell, Containers</text>
</svg>
