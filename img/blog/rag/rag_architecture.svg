<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#20B2AA"/>
    </marker>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#20B2AA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#178f8c;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- === INGESTION PIPELINE === -->
  <rect x="25" y="415" width="850" height="165" rx="12" fill="#f5f5f5" stroke="#a0d8d5" stroke-width="1.5"/>
  <text x="450" y="443" text-anchor="middle" font-size="12" font-weight="600" fill="#555" letter-spacing="1">INGESTION PIPELINE (OFFLINE)</text>

  <!-- PDF Docs -->
  <rect x="55" y="470" width="140" height="58" rx="8" fill="#fff" stroke="#20B2AA" stroke-width="2"/>
  <text x="125" y="497" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">PDF Documents</text>
  <text x="125" y="515" text-anchor="middle" font-size="11" fill="#666">10-Q / 10-K filings</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="499" x2="240" y2="499" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Text Chunks -->
  <rect x="245" y="470" width="140" height="58" rx="8" fill="#fff" stroke="#20B2AA" stroke-width="2"/>
  <text x="315" y="497" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">Text Chunks</text>
  <text x="315" y="515" text-anchor="middle" font-size="11" fill="#666">Recursive split</text>

  <!-- Arrow 2 -->
  <line x1="385" y1="499" x2="430" y2="499" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Embedding Model -->
  <rect x="435" y="465" width="150" height="68" rx="8" fill="#f0faf9" stroke="#20B2AA" stroke-width="2"/>
  <text x="510" y="492" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">Embedding Model</text>
  <text x="510" y="510" text-anchor="middle" font-size="11" fill="#666">Sentence Transformers</text>
  <text x="510" y="525" text-anchor="middle" font-size="10" fill="#20B2AA">all-mpnet-base-v2</text>

  <!-- Arrow 3 -->
  <line x1="585" y1="499" x2="630" y2="499" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vector Database -->
  <rect x="635" y="465" width="140" height="68" rx="8" fill="#f0faf9" stroke="#178f8c" stroke-width="2"/>
  <text x="705" y="492" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">Vector Database</text>
  <text x="705" y="510" text-anchor="middle" font-size="11" fill="#666">Chroma</text>
  <text x="705" y="525" text-anchor="middle" font-size="10" fill="#178f8c">persist to disk</text>

  <!-- === QUERY PIPELINE === -->
  <rect x="25" y="35" width="850" height="355" rx="12" fill="#fafafa" stroke="#a0d8d5" stroke-width="1.5"/>
  <text x="450" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#555" letter-spacing="1">QUERY PIPELINE (INFERENCE)</text>

  <!-- User Query -->
  <rect x="55" y="90" width="140" height="55" rx="8" fill="#fff" stroke="#20B2AA" stroke-width="2"/>
  <text x="125" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">User Query</text>
  <text x="125" y="133" text-anchor="middle" font-size="11" fill="#666">"What is Tesla's..."</text>

  <!-- Arrow Q1 -->
  <line x1="195" y1="117" x2="240" y2="117" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Embedding Model (query) -->
  <rect x="245" y="85" width="150" height="65" rx="8" fill="#f0faf9" stroke="#20B2AA" stroke-width="2"/>
  <text x="320" y="111" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">Embedding Model</text>
  <text x="320" y="128" text-anchor="middle" font-size="11" fill="#666">same model</text>
  <text x="320" y="143" text-anchor="middle" font-size="10" fill="#20B2AA">query → vector</text>

  <!-- Arrow Q2 -->
  <line x1="395" y1="117" x2="440" y2="117" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vector Search -->
  <rect x="445" y="90" width="140" height="55" rx="8" fill="#f0faf9" stroke="#178f8c" stroke-width="2"/>
  <text x="515" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">Vector Search</text>
  <text x="515" y="133" text-anchor="middle" font-size="11" fill="#666">cosine similarity</text>

  <!-- Arrow Q3 down -->
  <line x1="515" y1="145" x2="515" y2="170" stroke="#20B2AA" stroke-width="2" marker-end="url(#arrow-teal)"/>

  <!-- Retrieved Context -->
  <rect x="430" y="175" width="170" height="48" rx="8" fill="#fff" stroke="#20B2AA" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="515" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#20B2AA">Retrieved Context</text>
  <text x="515" y="213" text-anchor="middle" font-size="11" fill="#666">top-k most similar chunks</text>

  <!-- Arrow Q4 down -->
  <line x1="515" y1="223" x2="515" y2="255" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="390" y="260" width="250" height="65" rx="8" fill="#f0faf9" stroke="#20B2AA" stroke-width="2"/>
  <text x="515" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#282828">LLM Generation</text>
  <text x="515" y="303" text-anchor="middle" font-size="11" fill="#666">Prompt + Context + Query → Answer</text>
  <text x="515" y="318" text-anchor="middle" font-size="10" fill="#20B2AA">LLaMA 2 / GPT-3.5 / Gemma</text>

  <!-- Arrow Q5 down -->
  <line x1="515" y1="325" x2="515" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Final Answer -->
  <rect x="435" y="353" width="160" height="35" rx="18" fill="url(#header-grad)"/>
  <text x="515" y="376" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Final Answer</text>

  <!-- Labels -->
  <text x="830" y="125" text-anchor="end" font-size="11" fill="#999" font-style="italic">returns similar chunks</text>
  <line x1="585" y1="121" x2="790" y2="125" stroke="#a0d8d5" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="830" y="205" text-anchor="end" font-size="11" fill="#999" font-style="italic">indexed for fast retrieval</text>
  <line x1="600" y1="205" x2="790" y2="205" stroke="#a0d8d5" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
